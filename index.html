<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1c1c1e;
      --panel: #222326;
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --muted-strong: rgba(255, 255, 255, 0.82);
      --green: #34c759;
      --red: #ff3b30;
      --grey: #3a3a3c;
      --grey-hover: #47474a;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 32%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .app {
      width: min(980px, 100%);
      min-height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 22px;
      padding: 40px 24px 28px;
    }

    .header {
      text-align: center;
      padding-top: 8px;
    }

    .timer {
      font-size: clamp(72px, 11vw, 132px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      text-rendering: optimizeLegibility;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .history-shell {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-height: 280px;
      display: flex;
      flex-direction: column;
    }

    .history-head {
      display: grid;
      grid-template-columns: 1.05fr 1fr 1fr 1.1fr;
      gap: 0;
      padding: 18px 20px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted-strong);
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .history-body {
      flex: 1;
      overflow: auto;
    }

    .row {
      display: grid;
      grid-template-columns: 1.05fr 1fr 1fr 1.1fr;
      gap: 0;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      align-items: center;
      font-size: 15px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .empty-state {
      padding: 30px 20px;
      color: rgba(255, 255, 255, 0.42);
      font-size: 14px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 18px;
      padding-top: 6px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      min-width: 112px;
      height: 52px;
      padding: 0 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.14s ease, filter 0.14s ease, background-color 0.14s ease, opacity 0.14s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
      filter: brightness(0.98);
    }

    button:disabled {
      cursor: default;
      opacity: 0.45;
    }

    .btn-green {
      background: linear-gradient(180deg, #41d968, #28b84d);
      color: white;
    }

    .btn-red {
      background: linear-gradient(180deg, #ff5b52, #e6362c);
      color: white;
    }

    .btn-grey {
      background: linear-gradient(180deg, #4a4a4d, #333336);
      color: #f1f1f3;
    }

    .btn-grey.secondary {
      background: linear-gradient(180deg, #3f3f42, #2d2d30);
    }

    .btn-export {
      background: linear-gradient(180deg, #4b4b4f, #2f2f33);
      color: #f1f1f3;
    }

    .session-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .session-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.12);
    }

    @media (max-width: 760px) {
      .app {
        padding: 24px 14px 20px;
        gap: 18px;
      }

      .history-shell {
        border-radius: 20px;
      }

      .history-head,
      .row {
        grid-template-columns: 1.3fr 1fr 1fr 1.15fr;
        padding-left: 14px;
        padding-right: 14px;
        font-size: 13px;
      }

      .history-head {
        font-size: 10px;
      }

      button {
        min-width: 102px;
        height: 48px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header" aria-label="Stopwatch display">
      <div id="timer" class="timer">00:00:00.89</div>
      <div class="subtitle">GATE study session tracker with timestamped logs</div>
      <div class="session-tag"><span class="session-dot"></span><span id="sessionState">Ready</span></div>
    </section>

    <section class="history-shell" aria-label="Session history">
      <div class="history-head" role="row">
        <span>Event</span>
        <span>Lap/Split Duration</span>
        <span>Total Running Time</span>
        <span>Time of Day (Timestamp)</span>
      </div>
      <div id="historyBody" class="history-body" aria-live="polite"></div>
    </section>

    <div class="controls" aria-label="Stopwatch controls">
      <button id="resetBtn" class="btn-grey secondary" disabled>Reset</button>
      <button id="lapBtn" class="btn-grey" disabled>Lap</button>
      <button id="exportBtn" class="btn-export" disabled>Export to CSV</button>
      <button id="startBtn" class="btn-green">Start</button>
      <button id="stopBtn" class="btn-red" disabled>Stop</button>
    </div>
  </main>

  <script>
    (() => {
      const timerEl = document.getElementById('timer');
      const historyBody = document.getElementById('historyBody');
      const sessionState = document.getElementById('sessionState');
      const resetBtn = document.getElementById('resetBtn');
      const lapBtn = document.getElementById('lapBtn');
      const exportBtn = document.getElementById('exportBtn');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');

      const STORAGE_KEY = 'gate-study-stopwatch-state-v1';
      const RESET_DISPLAY = '00:00:00.89';

      const state = {
        running: false,
        startedAtEpoch: 0,
        elapsedBeforePause: 0,
        animationFrameId: null,
        lapStartElapsed: 0,
        lapCount: 0,
        rows: [],
        lastPersistedBucket: -1
      };

      function pad(number, length = 2) {
        return String(number).padStart(length, '0');
      }

      function formatElapsed(milliseconds) {
        const safeMs = Math.max(0, Math.floor(milliseconds));
        const totalHundredths = Math.floor((safeMs % 1000) / 10);
        const totalSeconds = Math.floor(safeMs / 1000);
        const seconds = totalSeconds % 60;
        const minutes = Math.floor(totalSeconds / 60) % 60;
        const hours = Math.floor(totalSeconds / 3600);
        return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}.${pad(totalHundredths)}`;
      }

      function formatClockTime(date) {
        return date.toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        });
      }

      function escapeCsvValue(value) {
        return `"${String(value).replace(/"/g, '""')}"`;
      }

      function buildSnapshot() {
        return {
          running: state.running,
          startedAtEpoch: state.startedAtEpoch,
          elapsedBeforePause: state.elapsedBeforePause,
          lapStartElapsed: state.lapStartElapsed,
          lapCount: state.lapCount,
          rows: state.rows,
          updatedAt: Date.now()
        };
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(buildSnapshot()));
        } catch (error) {
          // Ignore storage failures so the stopwatch still works offline or in private mode.
        }
      }

      function clearSavedState() {
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          // Ignore storage failures.
        }
      }

      function loadSavedState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return;
          }

          const saved = JSON.parse(raw);
          if (!saved || !Array.isArray(saved.rows)) {
            return;
          }

          state.running = Boolean(saved.running);
          state.startedAtEpoch = Number(saved.startedAtEpoch) || 0;
          state.elapsedBeforePause = Number(saved.elapsedBeforePause) || 0;
          state.lapStartElapsed = Number(saved.lapStartElapsed) || state.elapsedBeforePause;
          state.lapCount = Number(saved.lapCount) || 0;
          state.rows = saved.rows;

          if (state.running && !state.startedAtEpoch) {
            state.startedAtEpoch = Date.now();
          }
        } catch (error) {
          clearSavedState();
        }
      }

      function currentElapsed() {
        if (state.running) {
          return state.elapsedBeforePause + (Date.now() - state.startedAtEpoch);
        }
        return state.elapsedBeforePause;
      }

      function renderTimer() {
        timerEl.textContent = state.running || state.elapsedBeforePause > 0 || state.rows.length
          ? formatElapsed(currentElapsed())
          : RESET_DISPLAY;
      }

      function tick() {
        renderTimer();
        const bucket = Math.floor(currentElapsed() / 100);
        if (bucket !== state.lastPersistedBucket) {
          state.lastPersistedBucket = bucket;
          saveState();
        }
        state.animationFrameId = requestAnimationFrame(tick);
      }

      function setControls() {
        if (state.running) {
          startBtn.disabled = true;
          stopBtn.disabled = false;
          lapBtn.disabled = false;
          resetBtn.disabled = true;
          exportBtn.disabled = state.rows.length === 0;
          sessionState.textContent = 'Running';
        } else {
          startBtn.disabled = false;
          stopBtn.disabled = true;
          lapBtn.disabled = true;
          resetBtn.disabled = state.elapsedBeforePause === 0 && state.rows.length === 0;
          exportBtn.disabled = state.rows.length === 0;
          sessionState.textContent = state.elapsedBeforePause > 0 ? 'Paused' : 'Ready';
        }
      }

      function addRow(event, duration, total, timestamp) {
        state.rows.unshift({ event, duration, total, timestamp });
        renderHistory();
        saveState();
      }

      function syncRowButtons() {
        exportBtn.disabled = state.rows.length === 0;
        resetBtn.disabled = state.running || state.rows.length === 0;
      }

      function renderHistory() {
        historyBody.innerHTML = '';

        if (!state.rows.length) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'Session logs will appear here with lap times, total running time, and local timestamps.';
          historyBody.appendChild(empty);
          return;
        }

        state.rows.forEach((entry) => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <span>${entry.event}</span>
            <span>${entry.duration}</span>
            <span>${entry.total}</span>
            <span>${entry.timestamp}</span>
          `;
          historyBody.appendChild(row);
        });
      }

      function startTimer() {
        if (state.running) {
          return;
        }

        const hasExistingHistory = state.rows.length > 0;
        state.running = true;
        state.startedAtEpoch = Date.now();
        state.lapStartElapsed = state.elapsedBeforePause;
        if (!hasExistingHistory) {
          addRow('Session Started', '--', formatElapsed(0), formatClockTime(new Date()));
        }
        setControls();
        syncRowButtons();
        cancelAnimationFrame(state.animationFrameId);
        tick();
      }

      function stopTimer() {
        if (!state.running) {
          return;
        }

        state.elapsedBeforePause = currentElapsed();
        state.running = false;
        state.startedAtEpoch = 0;
        cancelAnimationFrame(state.animationFrameId);
        renderTimer();
        addRow('Session Paused', '--', formatElapsed(state.elapsedBeforePause), formatClockTime(new Date()));
        setControls();
        syncRowButtons();
      }

      function lapTimer() {
        if (!state.running) {
          return;
        }

        const elapsedNow = currentElapsed();
        const lapDuration = elapsedNow - state.lapStartElapsed;
        state.lapStartElapsed = elapsedNow;
        state.lapCount += 1;
        addRow(`Lap ${state.lapCount}`, formatElapsed(lapDuration), formatElapsed(elapsedNow), formatClockTime(new Date()));
      }

      function exportCsv() {
        if (!state.rows.length) {
          return;
        }

        const header = [
          'Event',
          'Lap/Split Duration',
          'Total Running Time',
          'Time of Day (Timestamp)'
        ];
        const lines = [header.map(escapeCsvValue).join(',')];

        state.rows.slice().reverse().forEach((row) => {
          lines.push([
            row.event,
            row.duration,
            row.total,
            row.timestamp
          ].map(escapeCsvValue).join(','));
        });

        const csv = lines.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = `gate-study-log-${new Date().toISOString().replace(/[:.]/g, '-')}.csv`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      }

      function resetTimer() {
        if (state.running) {
          return;
        }

        cancelAnimationFrame(state.animationFrameId);
        state.elapsedBeforePause = 0;
        state.startedAtEpoch = 0;
        state.lapStartElapsed = 0;
        state.lapCount = 0;
        state.rows = [];
        state.lastPersistedBucket = -1;
        clearSavedState();
        timerEl.textContent = RESET_DISPLAY;
        renderHistory();
        setControls();
        syncRowButtons();
      }

      function restoreState() {
        loadSavedState();
        renderHistory();

        if (state.running && state.startedAtEpoch) {
          state.lastPersistedBucket = Math.floor(currentElapsed() / 100);
          cancelAnimationFrame(state.animationFrameId);
          tick();
        } else {
          renderTimer();
        }

        setControls();
        syncRowButtons();
      }

      startBtn.addEventListener('click', startTimer);
      stopBtn.addEventListener('click', stopTimer);
      lapBtn.addEventListener('click', lapTimer);
      resetBtn.addEventListener('click', resetTimer);
      exportBtn.addEventListener('click', exportCsv);

      window.addEventListener('beforeunload', () => {
        if (state.running) {
          state.elapsedBeforePause = currentElapsed();
          state.startedAtEpoch = Date.now();
        }
        saveState();
      });

      restoreState();
      if (!state.rows.length) {
        timerEl.textContent = RESET_DISPLAY;
      }
    })();
  </script>
</body>
</html>
